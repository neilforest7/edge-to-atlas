name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    name: Test and package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test
        run: npm test

      - name: Package
        run: npm run package

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: edge-atlas-packages
          path: dist/*.zip
          if-no-files-found: error
